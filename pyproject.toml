[build-system]
requires = ["uv_build>=0.9.22,<0.10.0"]
build-backend = "uv_build"

[project]
name = "dna_modelling"
version = "0.0.1"
description = "A short description of the project."
authors = [
  { name = "Emil", email = "your@email.com" },
]

keywords = ["machine learning", "MLOps"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Programming Language :: Python :: 3",
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy==1.26.4",
    "matplotlib>=3.10.0",
    "scanpy>=1.11.5",
    "scipy>=1.16.0",
    "torch==2.10.0+cu126",
    "tqdm==4.67.1",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cu126" },
]
torchvision = [
    { index = "pytorch-cu126" },
]

[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/cu126"
explicit = true

[tool.ruff]
line-length = 120

[dependency-groups]
dev = [
    "coverage>=7.10.6",
    "invoke>=2.2.1",
    "mkdocs>=1.6.1",
    "pre-commit>=4.3.0",
    "pytest>=8.4.2",
    "ruff>=0.15.4",
]
